<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/admin_dashboard.css') }}">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="logo">

<img src="{{ url_for('static', filename='images/logo.png') }}">

<h2>Saju Natural Honey Admin</h2>

</div>

<a href="/admin/logout" class="logout-btn">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</header>


<div class="dashboard">

<div class="top">

<h1>Products</h1>

<a href="/admin/add-product" class="add-btn">

<i class="fa-solid fa-plus"></i>

Add Product

</a>

</div>


<table>

<thead>

<tr>

<th>Image</th>

<th>Name</th>

<th>500 g</th>

<th>1 KG</th>

<th>Actions</th>

</tr>

</thead>

<tbody>

{% for product in products %}

<tr>

<td>

<img src="{{ url_for('static', filename='uploads/' + product.image) }}">

</td>

<td>{{ product.name }}</td>

<td>₹{{ product.price500 }}</td>

<td>₹{{ product.price1kg }}</td>

<td>

<a href="{{ url_for('edit_product', index=loop.index0) }}" class="edit">
    Edit
</a>

<a href="{{ url_for('delete_product', index=loop.index0) }}" class="delete">
    Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
